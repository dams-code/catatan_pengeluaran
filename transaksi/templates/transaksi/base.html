<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Catatan Pengeluaran</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            Catatan Pengeluaran
        </a>

        <div class="navbar-nav me-auto">
            <a class="nav-link" href="{% url 'dashboard' %}">Dashboard Pengeluaran</a>
            {% comment %} <a class="nav-link" href="{% url 'tambah_pengeluaran' %}">Tambah</a>
            <a class="nav-link" href="{% url 'admin:index' %}">Admin</a> {% endcomment %}
            {% comment %} <a class="nav-link" href="{% url 'admin:index' %}">Admin</a> {% endcomment %}
        </div>

        <div class="navbar-nav">
            {% if user.is_authenticated %}
                <span class="navbar-text text-white me-3">
                    Halo, {{ user.username }}
                </span>

                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit"  class="btn btn-sm btn-light">
                        Logout
                    </button>
                </form>
            {% else %}
                <a class="btn btn-sm btn-light" href="{% url 'login' %}">
                    Login
                </a>
                <a class="btn btn-sm btn-outline-light" href="{% url 'registrasi' %}">
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

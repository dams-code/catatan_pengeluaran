{% extends "transaksi/base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">Hapus Pengeluaran</h5>
            </div>

            <div class="card-body">
                <p>Apakah kamu yakin ingin menghapus data berikut?</p>

                <ul class="list-group mb-3">
                    <li class="list-group-item">
                        <strong>Judul:</strong> {{ pengeluaran.judul }}
                    </li>
                    <li class="list-group-item">
                        <strong>Jumlah:</strong> Rp {{ pengeluaran.jumlah }}
                    </li>
                    <li class="list-group-item">
                        <strong>Tanggal:</strong> {{ pengeluaran.tanggal }}
                    </li>
                </ul>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Ya, Hapus
                    </button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                        Batal
                    </a>
                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
